<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplos de Animacao</title>
  <meta
    name="description"
    content="Uma vitrine editorial com exemplos de animacoes para interface, cada uma com demonstracao visual e explicacao objetiva."
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">

    <section class="example-list">
      <div class="example-item reveal" data-reveal>
        <div class="motion-demo demo-fade" data-demo="fade">
          <div class="fade-box fade-a"></div>
          <div class="fade-box fade-b"></div>
          <div class="fade-box fade-c"></div>
        </div>
        <h3>Fade In</h3>
      </div>

      <div class="example-item reveal" data-reveal>
        <div class="motion-demo demo-slide" data-demo="slide">
          <div class="slide-bar slide-1"></div>
          <div class="slide-bar slide-2"></div>
          <div class="slide-bar slide-3"></div>
        </div>
        <h3>Slide Up</h3>
      </div>

      <div class="example-item reveal" data-reveal>
        <div class="motion-demo demo-text" data-demo="text">
          <div class="text-mask">
            <span>ai catatau</span>
            <span>calma mano</span>
            <span>respira</span>
          </div>
        </div>
        <h3>Text Reveal</h3>
      </div>

      <div class="example-item reveal" data-reveal>
        <div class="motion-demo demo-stagger" data-demo="stagger">
          <div class="stagger-row">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <h3>Stagger</h3>
      </div>

      <div class="example-item reveal" data-reveal>
        <div class="motion-demo demo-float" data-demo="float">
          <div class="float-chip chip-a"></div>
          <div class="float-chip chip-b"></div>
          <div class="float-chip chip-c"></div>
          <div class="float-chip chip-d"></div>
        </div>
        <h3>Floating</h3>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
